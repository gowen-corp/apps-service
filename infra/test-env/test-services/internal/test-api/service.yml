name: test-api
display_name: Test API
version: "0.1.0"
description: Test API service for full-cycle testing
type: docker-compose
visibility: internal
routing:
  - type: port
    internal_port: 8000
    port: 9000
    strip_prefix: true
health:
  enabled: true
  endpoint: /
  interval: 15s
  timeout: 5s
  retries: 3
backup:
  enabled: false
tags:
  - test
