# Isolated test environment (DinD — Docker-in-Docker)
# Симулирует production сервер в изолированном контейнере
#
# Использование:
#   cd infra/test-env
#   docker compose up -d
#   docker compose exec test-env bash
#   ./test_full_cycle.sh
#   docker compose down -v

services:
  test-env:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: platform-test-env
    privileged: true  # Required for Docker-in-Docker
    environment:
      - APP_ENV=test
      - DEBUG=true
    volumes:
      # Монтируем проект
      - ../../:/projects/apps-service-opus
      # Хостовый Docker (вместо DinD — DinD нестабилен на некоторых хостах)
      - /var/run/docker.sock:/var/run/docker.sock
    # Entrypoint только настраивает симлинки
    entrypoint: ["/entrypoint-simple.sh"]
    networks:
      - test_isolated

volumes: {}

networks:
  test_isolated:
    driver: bridge
    name: platform_test_isolated
