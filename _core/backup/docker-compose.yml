version: "3.8"

services:
  restic:
    image: restic/restic:latest
    container_name: restic_backup
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - RESTIC_REPOSITORY=/backups
    volumes:
      - ./restic-cache:/cache
      - ../../backups:/backups
      - ../../services:/services:ro
    networks:
      - platform

networks:
  platform:
    external: true
    name: platform_network